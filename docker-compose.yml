services:f
  postgres:
    image: postgres:17
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: mydb
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  postgrest:
    image: postgrest/postgrest
    container_name: postgrest
    ports:
      - "3002:3000"
    environment:
      PGRST_DB_URI: postgres://postgres:mysecretpassword@postgres:5432/mydb
      PGRST_DB_ANON_ROLE: postgres f
    depends_on:
      - postgres

volumes:
  postgres_data: