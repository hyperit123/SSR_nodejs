<div style=" margin: 20px 0;">
 <h1>Welcome til skuespillere Page</h1>
 <p>Se liste av skuespillere neddenfor.</p>
</div>

<ul id="skuespillere">
 <li>Henter data...</li>
</ul>

<p>
 <input id="name" placeholder="Navn på skuespiller" type="text">
 <button id="add">Legg inn ny skuespiller</button>
</p>

<button style="margin-top: 10px;" onclick="window.location.href='/'">Tilbake til hjemmesiden</button>

<script>
 async function fetchSkuespillere() {
  try {
   const response = await fetch('/skuespillere');
   const data = await response.json();
   console.log('Fetched skuespillere:', data);
   let list = document.getElementById('skuespillere');
   list.innerHTML = '';
   data.forEach(row => {
    let li = document.createElement('li');
    li.textContent = row.navn; // Updated to use the correct property name
    list.appendChild(li);
   });
  } catch (error) {
   console.error('Error fetching skuespillere:', error);
   let list = document.getElementById('skuespillere');
   list.innerHTML = '<li>Kunne ikke hente data.</li>';
  }
 }

fetchSkuespillere();
</script>
<script type="module">
 function getUserName() {
  const inputElement = document.getElementById('name');
  return inputElement.value;
 }

 document.getElementById('add')
  .addEventListener('click', async (event) => {
   const userName = getUserName();
   await sendData(userName);
  });

 async function sendData(userName) {
  const data = { navn: userName };
  const response = await fetch('/skuespillere', {
   method: 'POST',
   headers: {
    'Content-Type': 'application/json'
   },
   body: JSON.stringify(data)
  });
  if (response.ok) {
   console.log('Data sent successfully');
   fetchSkuespillere(); // Oppdater listen etter å ha lagt til en ny skuespiller
  } else {
   console.error('Error sending data');
  }
  const inputElement = document.getElementById('name');
  inputElement.value = ''; // Clear the input field after sending data
 }
</script>
